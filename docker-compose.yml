# ──────────────────────────────────────────────────────────────────────
#  SNMP Manager — Docker Compose
#
#  Ishga tushirish:   docker compose up -d
#  Loglarni ko'rish:  docker compose logs -f snmp-manager
#  To'xtatish:        docker compose down
#
#  Loglar:  ./logs/ papkasiga yoziladi (mount qilingan)
#  Config:  ./configs/config.docker.yaml dan o'qiladi
# ──────────────────────────────────────────────────────────────────────

services:
  # ── Elasticsearch ─────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: snmp-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=snmp-cluster
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - snmp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── SNMP Manager ──────────────────────────────────────────────────
  snmp-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snmp-manager
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy

    # Host network — SNMP UDP to'g'ri ishlashi uchun
    network_mode: host

    # ── Volume mount'lar ─────────────────────────────────────────────
    volumes:
      # Loglar — host mashinaga yoziladi
      - ./logs:/var/log/snmp-manager

      # Config faylini tashqaridan boshqarish
      - ./configs/config.docker.yaml:/etc/snmp-manager/config.yaml

      # MIB fayllar
      - ./mibs:/usr/share/snmp/mibs:ro

    # ── Muhit o'zgaruvchilari ────────────────────────────────────────
    environment:
      - TZ=Asia/Tashkent
      - ES_ADDRESSES=http://localhost:9200
      - ES_INDEX=snmp-events

    # ── Healthcheck ──────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # ── Logging ──────────────────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  es-data:
    driver: local

networks:
  snmp-net:
    driver: bridge
