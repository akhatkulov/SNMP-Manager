# ──────────────────────────────────────────────────────────────────────
#  SNMP Manager Configuration — Docker Environment
#  Loglar /var/log/snmp-manager ga yoziladi (tashqariga mount qilinadi)
# ──────────────────────────────────────────────────────────────────────

server:
  name: "snmp-manager-01"
  log_level: "info"         # debug, info, warn, error
  log_format: "json"        # json (production), console (development)

# ── MIB Settings ──────────────────────────────────────────────────────
mib:
  load_system_mibs: true
  directories:
    - "/usr/share/snmp/mibs"
    - "/usr/share/snmp/mibs/extra"
    - "/usr/share/snmp/mibs/vendor/eltex"
    - "/usr/share/snmp/mibs/vendor/mikrotik"
    - "/usr/share/snmp/mibs/vendor/huawei"
    - "/usr/share/snmp/mibs/vendor/dlink"

# ── SNMP Poller ───────────────────────────────────────────────────────
poller:
  workers: 1
  default_interval: 60s
  timeout: 5s
  retries: 2
  max_oids_per_request: 20

# ── Trap Receiver ─────────────────────────────────────────────────────
trap_receiver:
  enabled: true
  listen_address: "0.0.0.0:162"

# ── Devices ───────────────────────────────────────────────────────────
devices:
  - name: "SW2"
    ip: "10.10.11.53"
    port: 161
    snmp_version: "v2c"
    community: "sw2"
    poll_interval: 60s
    oid_groups:
      - "system"
      - "interfaces"
    tags:
      location: "DC-Tashkent"
      criticality: "high"
      environment: "production"

# ── Pipeline ──────────────────────────────────────────────────────────
pipeline:
  buffer_size: 10000
  batch_size: 100
  flush_interval: 5s
  workers: 4

  normalizer:
    resolve_oid_names: true
    resolve_hostnames: false

  enricher:
    geoip_db: ""
    asset_db: ""

# ── Outputs ───────────────────────────────────────────────────────────
outputs:
  # Console (docker logs orqali ko'rish uchun)
  - type: "stdout"
    enabled: true

  # File output — /var/log/snmp-manager tashqariga mount qilinadi
  - type: "file"
    enabled: true
    path: "/var/log/snmp-manager/snmp-events.log"
    max_size_mb: 100
    max_backups: 5
    compress: true

  # Per-device fayl output — har qurilma uchun alohida log
  # /var/log/snmp-manager/devices/{device_ip}/events.jsonl
  - type: "device_file"
    enabled: true
    path: "/var/log/snmp-manager/devices"
    max_size_mb: 50
    max_backups: 7

  # Elasticsearch — event storage va search uchun
  - type: "elasticsearch"
    enabled: true
    addresses:
      - "${ES_ADDRESSES}"
    index: "${ES_INDEX}"
    tls_skip_verify: true

# ── REST API ──────────────────────────────────────────────────────────
api:
  enabled: true
  listen_address: "0.0.0.0:8080"
  auth:
    type: "api_key"
    keys:
      - "dev-api-key-change-me"
  admin_panel:
    username: "admin"
    password: "admin123"

# ── Prometheus Metrics ────────────────────────────────────────────────
metrics:
  enabled: true
  listen_address: "0.0.0.0:9090"
  path: "/metrics"
